<script>
  // ---------- EVIL GN-MATH WITH TOGGLE ZONES ----------
  const container = document.getElementById('container');
  const zoneViewer = document.getElementById('zoneViewer');
  let zoneFrame = document.getElementById('zoneFrame');
  const searchBar = document.getElementById('searchBar');
  const sortOptions = document.getElementById('sortOptions');
  const featuredContainer = document.getElementById('featuredZones');

  const zonesurls = [
    "https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json",
    "https://cdn.jsdelivr.net/gh/gn-math/assets@latest/zones.json",
    "https://cdn.jsdelivr.net/gh/gn-math/assets@master/zones.json",
    "https://cdn.jsdelivr.net/gh/gn-math/assets/zones.json"
  ];
  const zonesURL = zonesurls[Math.floor(Math.random() * zonesurls.length)];
  const coverURL = "https://cdn.jsdelivr.net/gh/gn-math/covers@main";
  const htmlURL = "https://cdn.jsdelivr.net/gh/gn-math/html@main";

  let zones = [];
  let popularityData = {};

  // vault toggle state (default: both open)
  let vaultState = { featured: true, all: true };

  function toggleVault(vaultName) {
    const containerId = vaultName === 'featured' ? 'featuredZones' : 'container';
    const toggleId = vaultName === 'featured' ? 'featuredToggle' : 'allToggle';
    const zoneContainer = document.getElementById(containerId);
    const toggleIcon = document.getElementById(toggleId);
    
    if (vaultName === 'featured') {
      vaultState.featured = !vaultState.featured;
      if (vaultState.featured) {
        zoneContainer.classList.remove('collapsed');
        toggleIcon.innerHTML = '▼';
      } else {
        zoneContainer.classList.add('collapsed');
        toggleIcon.innerHTML = '▶';
      }
    } else {
      vaultState.all = !vaultState.all;
      if (vaultState.all) {
        zoneContainer.classList.remove('collapsed');
        toggleIcon.innerHTML = '▼';
      } else {
        zoneContainer.classList.add('collapsed');
        toggleIcon.innerHTML = '▶';
      }
    }
  }

  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = message;
    document.getElementById('toastContainer').appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  // fetch zones
  async function listZones() {
    try {
      const response = await fetch(zonesURL+"?t="+Date.now());
      const json = await response.json();
      zones = json;
      if (zones.length) zones[0].featured = true; 
      await fetchPopularity();
      sortZones();
      document.getElementById('totalGamesStat').innerText = zones.length;

      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      if (id) {
        const zone = zones.find(z => z.id + '' == id + '');
        if (zone) openZone(zone);
      }
    } catch (error) {
      container.innerHTML = `error: ${error}`;
    }
  }

  async function fetchPopularity() {
    try {
      const resp = await fetch("https://data.jsdelivr.com/v1/stats/packages/gh/gn-math/html@main/files?period=year");
      const data = await resp.json();
      data.forEach(file => {
        const idMatch = file.name.match(/\/(\d+)\.html$/);
        if (idMatch) popularityData[parseInt(idMatch[1])] = file.hits.total;
      });
    } catch { /* ignore */ }
  }

  function sortZones() {
    const by = sortOptions.value;
    if (by === 'name') zones.sort((a,b) => a.name.localeCompare(b.name));
    else if (by === 'id') zones.sort((a,b) => a.id - b.id);
    else if (by === 'popular') zones.sort((a,b) => (popularityData[b.id]||0) - (popularityData[a.id]||0));
    
    displayFeaturedZones(zones.filter(z => z.featured));
    displayZones(zones);
  }

  function displayFeaturedZones(featured) {
    featuredContainer.innerHTML = "";
    featured.forEach(file => featuredContainer.appendChild(createZoneCard(file)));
    document.getElementById('featuredCount')?.innerText = featured.length;
    lazyLoadImages('#featuredZones');
  }

  function displayZones(list) {
    container.innerHTML = "";
    list.forEach(file => container.appendChild(createZoneCard(file)));
    document.getElementById('allCount')?.innerText = list.length;
    lazyLoadImages('#container');
  }

  function createZoneCard(file) {
    const div = document.createElement('div');
    div.className = 'zone-item';
    div.onclick = () => openZone(file);
    
    const mediaDiv = document.createElement('div');
    mediaDiv.className = 'zone-media';
    const img = document.createElement('img');
    img.dataset.src = file.cover?.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL) || '';
    img.alt = file.name;
    img.loading = 'lazy';
    img.classList.add('lazy-img');
    mediaDiv.appendChild(img);
    
    const overlay = document.createElement('div');
    overlay.className = 'zone-overlay';
    overlay.innerText = 'PLAY';
    mediaDiv.appendChild(overlay);
    
    const contentDiv = document.createElement('div');
    contentDiv.className = 'zone-content';
    const nameSpan = document.createElement('div');
    nameSpan.className = 'zone-name';
    nameSpan.innerText = file.name;
    const metaDiv = document.createElement('div');
    metaDiv.className = 'zone-meta';
    const authorSpan = document.createElement('span');
    authorSpan.className = 'zone-author';
    authorSpan.innerText = file.author;
    metaDiv.appendChild(authorSpan);
    contentDiv.appendChild(nameSpan);
    contentDiv.appendChild(metaDiv);
    
    const playBtn = document.createElement('button');
    playBtn.innerText = 'launch';
    playBtn.onclick = (e) => { e.stopPropagation(); openZone(file); };
    
    div.appendChild(mediaDiv);
    div.appendChild(contentDiv);
    div.appendChild(playBtn);
    return div;
  }

  function lazyLoadImages(selector) {
    const obs = new IntersectionObserver((entries, ob) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const img = e.target;
          if (img.dataset.src) img.src = img.dataset.src;
          img.classList.remove('lazy-img');
          ob.unobserve(img);
        }
      });
    }, { rootMargin: "200px" });
    document.querySelectorAll(selector + ' img.lazy-img').forEach(img => obs.observe(img));
  }

  function filterZones() {
    const q = searchBar.value.toLowerCase();
    displayZones(zones.filter(z => z.name.toLowerCase().includes(q)));
  }

  // zone viewer functions (preserved)
  function openZone(file) {
    if (file.url.startsWith("http")) {
      window.open(file.url, "_blank");
    } else {
      const url = file.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
      fetch(url+"?t="+Date.now()).then(r => r.text()).then(html => {
        if (!zoneFrame || !zoneFrame.contentDocument) {
          zoneFrame = document.createElement("iframe");
          zoneFrame.id = "zoneFrame";
          document.getElementById('zoneViewer').appendChild(zoneFrame);
        }
        zoneFrame.contentDocument.open();
        zoneFrame.contentDocument.write(html);
        zoneFrame.contentDocument.close();
        document.getElementById('zoneName').textContent = file.name;
        const authorEl = document.getElementById('zoneAuthor');
        authorEl.textContent = "by " + file.author;
        if (file.authorLink) authorEl.href = file.authorLink;
        zoneViewer.dataset.currentId = file.id;
        
        zoneViewer.style.display = "flex";
        history.pushState(null, '', `?id=${file.id}`);
        showToast(`now playing: ${file.name}`);
      }).catch(e => alert("load error: "+e));
    }
  }

  function closeZone() {
    zoneViewer.style.display = "none";
    if (zoneFrame && zoneFrame.parentNode) zoneFrame.remove();
    zoneFrame = null;
    history.pushState(null, '', window.location.pathname);
  }

  function aboutBlank() {
    const id = zoneViewer.dataset.currentId;
    const zone = zones.find(z => z.id + '' === id);
    if (!zone) return;
    const url = zone.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
    fetch(url+"?t="+Date.now()).then(r => r.text()).then(html => {
      const w = window.open("about:blank", "_blank");
      if (w) { w.document.write(html); w.document.close(); }
    });
  }

  function downloadZone() {
    const id = zoneViewer.dataset.currentId;
    const zone = zones.find(z => z.id + '' === id);
    if (!zone) return;
    fetch(zone.url.replace("{HTML_URL}", htmlURL)+"?t="+Date.now()).then(r => r.text()).then(text => {
      const blob = new Blob([text], {type: "text/html"});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = zone.name + ".html";
      a.click();
      showToast('download started');
    });
  }

  function fullscreenZone() {
    const iframe = document.getElementById('zoneFrame');
    if (iframe?.requestFullscreen) iframe.requestFullscreen();
    else if (iframe?.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
  }

  // settings popup
  document.getElementById('settings').addEventListener('click', () => {
    document.getElementById('popupTitle').textContent = "settings";
    document.getElementById('popupBody').innerHTML = `
      <button id="settings-button" onclick="darkMode()">dark mode (placeholder)</button>
      <button id="settings-button" onclick="tabCloak()">tab cloak</button>
    `;
    document.getElementById('popupOverlay').style.display = "flex";
  });

  function showContact() {
    document.getElementById('popupTitle').textContent = "contact";
    document.getElementById('popupBody').innerHTML = `<p>discord: evil-gn-math · email: gn.math.business@gmail.com</p>`;
    document.getElementById('popupOverlay').style.display = "flex";
  }

  function loadPrivacy() {
    document.getElementById('popupTitle').textContent = "privacy";
    document.getElementById('popupBody').innerHTML = `<p>no personal data collected. ads by google. we evil but we care.</p>`;
    document.getElementById('popupOverlay').style.display = "flex";
  }

  function tabCloak() {
    closePopup();
    document.getElementById('popupTitle').textContent = "tab cloak";
    document.getElementById('popupBody').innerHTML = `
      <label>tab title</label>
      <input type="text" id="cloakTitle" placeholder="evil gn-math" oninput="cloakName(this.value)">
      <label>icon url</label>
      <input type="text" id="cloakIcon" placeholder="https://.../favicon.png" oninput="cloakIcon(this.value)">
    `;
    document.getElementById('popupOverlay').style.display = "flex";
  }

  function cloakName(t) { document.title = t.trim() || "evil gn-math · NEO"; }
  function cloakIcon(url) {
    let link = document.querySelector("link[rel~='icon']") || document.createElement('link');
    link.rel = 'icon';
    link.href = url.trim() || "favicon.png";
    document.head.appendChild(link);
  }
  function darkMode() { document.body.classList.toggle("dark-mode"); }
  function closePopup() { document.getElementById('popupOverlay').style.display = "none"; }

  // stub export/import
  async function saveData() { alert("export placeholder"); }
  async function loadData(e) { alert("import placeholder"); }

  // Blocking (original)
  const schoolList = ["deledao","goguardian","lightspeed","linewize","securly",".edu/"];
  function isBlockedDomain(u) {
    try { let d = new URL(u, location.origin).hostname + "/"; return schoolList.some(s => d.includes(s)); } catch { return false; }
  }
  const originalFetch = window.fetch;
  window.fetch = function(u, opts) { if (isBlockedDomain(u)) return Promise.reject("blocked"); return originalFetch.apply(this, arguments); };
  const originalOpen = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function(m, u) { if (!isBlockedDomain(u)) return originalOpen.apply(this, arguments); };
  HTMLCanvasElement.prototype.toDataURL = function() { return ""; };

  // start everything
  listZones();

  // interactive hero
  document.getElementById('heroCard')?.addEventListener('mousemove', (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    e.currentTarget.style.setProperty('--x', x + '%');
    e.currentTarget.style.setProperty('--y', y + '%');
  });
</script>
</body>
