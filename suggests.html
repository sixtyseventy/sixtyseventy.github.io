<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", "Segoe UI", sans-serif;
    }

    body {
        background: #000;
        color: #fff;
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: repeating-linear-gradient(
            90deg,
            rgba(255,255,255,0.03) 0px,
            rgba(255,255,255,0.03) 1px,
            transparent 1px,
            transparent 80px
        );
        animation: moveBg 20s linear infinite;
    }

    @keyframes moveBg {
        from { transform: translateX(0); }
        to { transform: translateX(-200px); }
    }

    .container {
        text-align: center;
        z-index: 2;
        position: relative;
        max-width: 800px;
    }

    .title {
        font-size: 3rem;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: lowercase;
        margin-bottom: 20px;
        animation: fadeIn 1.5s ease forwards;
    }

    .subtitle {
        font-size: 1.2rem;
        opacity: 0.7;
        letter-spacing: 1px;
        animation: fadeIn 2.5s ease forwards;
    }

    .line {
        width: 120px;
        height: 2px;
        background: #fff;
        margin: 30px auto;
        opacity: 0.3;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { opacity: 0.1; width: 80px; }
        50% { opacity: 0.6; width: 140px; }
        100% { opacity: 0.1; width: 80px; }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .glow {
        text-shadow: 0 0 10px rgba(255,255,255,0.4),
                     0 0 20px rgba(255,255,255,0.2);
    }

    .corner {
        position: absolute;
        bottom: 20px;
        right: 30px;
        font-size: 0.7rem;
        opacity: 0.3;
        letter-spacing: 2px;
    }
</style>
</head>

<script>
function randomString(length = 8) {
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
    let result = "";
    for (let i = 0; i < length; i++) {
        result += chars[Math.floor(Math.random() * chars.length)];
    }
    return result;
}

function updateURL() {
    const newPath = "/" + randomString(10);
}

function updateTitle() {
    document.title = randomString(6) + "..." + randomString(4);
}

setInterval(() => {
    updateURL();
    updateTitle();
}, 5); 
</script>

/* Suggestion Form */
.suggestion-container {
  background: rgba(0,0,0,.2);

  overflow: hidden;

.suggestion-container::before {

.suggestion-submit {

.suggestions-container {

.suggestion-card {

<script>
const loadBar    = document.getElementById('loadBar');
const loadStatus = document.getElementById('loadStatus');
const loadPct    = document.getElementById('loadPct');

const loadSteps = [
  { p:12, t:'booting systems'     },
  { p:30, t:'loading suggestions' },
  { p:52, t:'preparing form'      },
  { p:70, t:'connecting discord'  },
  { p:88, t:'almost ready'        },
  { p:100,t:'launching'           },
];

let stepIdx = 0;

function advanceLoader(pct, label) {
  loadBar.style.width = pct + '%';
  loadPct.textContent = pct + '%';
  if (label) loadStatus.textContent = label;
}

function runLoadSeq() {
  const iv = setInterval(() => {
    if (stepIdx < loadSteps.length) {
      advanceLoader(loadSteps[stepIdx].p, loadSteps[stepIdx].t);
      stepIdx++;
    } else {
      clearInterval(iv);
    }
  }, 300);
}

function hideLoader() {
  advanceLoader(100, 'ready!');
  setTimeout(() => document.getElementById('loadingScreen').classList.add('hidden'), 450);
}

runLoadSeq();

const firebaseConfig = {
  apiKey: "AIzaSyA-68XKNt_PD0I1TJbNcyotT4qMbgHh-tI",
  authDomain: "ph-science.firebaseapp.com",
  databaseURL: "https://ph-science-default-rtdb.firebaseio.com",
  projectId: "ph-science",
  storageBucket: "ph-science.firebasestorage.app",
  messagingSenderId: "883067098385",
  appId: "1:883067098385:web:036ccc248ffa4f44cf28b0",
  measurementId: "G-54XJK643G2",
};

// Initialize Firebase
try {
  firebase.initializeApp(firebaseConfig);
  console.log('Firebase initialized');
} catch (e) {
  console.error('Firebase init error:', e);
}

const auth = firebase.auth();
const database = firebase.database();

// Discord Webhook URL
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1480159918106607817/11kd8WVltMFCjwXzpKLg8-bw-uf6iHsBTogSb3A0wu8LrnKCFonSPFqaYulfLVujNcJL";

let suggestions = [];
let currentUser = null;
let isGuest = false;
let expandedSuggestionId = null;

const typeLabels = {
  'feature': '✨ Feature Request',
  'ui': '🎨 UI/UX Improvement',
  'bug': '🐛 Bug Report',
  'other': '💭 Other'
};

const urgencyLabels = {
  'low': '🔹 Low',
  'medium': '🔸 Medium',
  'high': '🔺 High',
  'critical': '⚠️ Critical'
};

// Load suggestions from Firebase with error handling
function loadSuggestions() {
  const suggestionsRef = database.ref('suggestions');
  
  suggestionsRef.on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      suggestions = Object.keys(data).map(key => ({
        id: key,
        ...data[key]
      }));
      console.log(`✅ Loaded ${suggestions.length} suggestions`);
    } else {
      suggestions = [];
      console.log('📭 No suggestions found - database exists but empty');
    }
    updateSuggestionsDisplay();
  }, (error) => {
    console.error('❌ Firebase read error:', error);
    
    if (error.code === 'PERMISSION_DENIED') {
      showToast('⚠️ Database permission denied. Check Firebase rules.');
    } else if (error.message && error.message.includes('404')) {
      showToast('⚠️ Firebase database not found! Please create it in Firebase Console.');
      console.error('Database URL might be wrong or database not created:', firebaseConfig.databaseURL);
    } else {
      showToast('⚠️ Could not load suggestions: ' + (error.message || 'Unknown error'));
    }
    
    suggestions = [];
    updateSuggestionsDisplay();
  });
}

function saveSuggestionToFirebase(suggestion) {
  return new Promise((resolve, reject) => {
    const suggestionsRef = database.ref('suggestions');
    const newSuggestionRef = suggestionsRef.push();
    
    // Ensure timestamp is a number
    suggestion.timestamp = Date.now();
    
    newSuggestionRef.set(suggestion, (error) => {
      if (error) {
        console.error('❌ Firebase write error:', error);
        reject(error);
      } else {
        console.log('✅ Suggestion saved with ID:', newSuggestionRef.key);
        resolve(newSuggestionRef.key);
      }
    });
  });
}

function updateSuggestionsDisplay() {
  const container = document.getElementById('suggestionsContainer');
  const countEl = document.getElementById('suggestionsCount');
  
  if (!container) return;
  
  countEl.textContent = suggestions.length;
  document.getElementById('totalSuggestionsStat').textContent = suggestions.length;
  
  if (suggestions.length === 0) {
    container.innerHTML = '<div class="empty-suggestions">💭 No suggestions yet. Be the first to share an idea!</div>';
    return;
  }
  
  // Sort by newest first
  const sorted = [...suggestions].sort((a, b) => b.timestamp - a.timestamp);
  
  container.innerHTML = '';
  sorted.forEach(s => {
    container.appendChild(createSuggestionCard(s));
  });
}

function toggleSuggestionExpand(id) {
  expandedSuggestionId = expandedSuggestionId === id ? null : id;
  updateSuggestionsDisplay();
}

function createSuggestionCard(s) {
  const div = document.createElement('div');
  div.className = 'suggestion-card';
  if (expandedSuggestionId === s.id) {
    div.classList.add('expanded');
  }
  
  div.onclick = () => toggleSuggestionExpand(s.id);
  
  const typeDisplay = {
    'feature': '✨ Feature',
    'ui': '🎨 UI/UX',
    'bug': '🐛 Bug',
    'other': '💭 Other'
  };
  
  const urgencyColors = {
    'low': '#4a90e2',
    'medium': '#ffb347',
    'high': '#ff6b00',
    'critical': '#ff4444'
  };
  
  const previewHtml = `
    <div class="suggestion-preview">
      <span class="suggestion-type" style="border-color: ${urgencyColors[s.urgency]}; color: ${urgencyColors[s.urgency]}">${typeDisplay[s.type] || s.type}</span>
      <div class="suggestion-title">${escapeHtml(s.title)}</div>
      <div class="suggestion-description-preview">${escapeHtml(s.description)}</div>
      <div class="suggestion-meta">
        <span class="suggestion-author">${escapeHtml(s.author)}</span>
        <span class="suggestion-date">${formatDate(s.timestamp)}</span>
      </div>
      <div class="expand-indicator">▼ click to expand</div>
    </div>
  `;
  
  const fullHtml = `
    <div class="suggestion-preview">
      <span class="suggestion-type" style="border-color: ${urgencyColors[s.urgency]}; color: ${urgencyColors[s.urgency]}">${typeDisplay[s.type] || s.type}</span>
      <div class="suggestion-title">${escapeHtml(s.title)}</div>
    </div>
    <div class="suggestion-description-full">
      ${escapeHtml(s.description)}
    </div>
    <div class="suggestion-meta" style="margin: 0 1.6rem 1.6rem 1.6rem; width: auto;">
      <span class="suggestion-author">${escapeHtml(s.author)}</span>
      <span class="suggestion-date">${formatDate(s.timestamp)}</span>
    </div>
    <div class="expand-indicator" style="margin-bottom: 1rem;">▲ click to collapse</div>
  `;
  
  div.innerHTML = expandedSuggestionId === s.id ? fullHtml : previewHtml;
  
  return div;
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatDate(timestamp) {
  if (!timestamp) return 'unknown';
  const date = new Date(timestamp);
  const now = new Date();
  const diff = now - date;
  
  if (diff < 86400000) {
    return 'today';
  } else if (diff < 172800000) {
    return 'yesterday';
  } else {
    return date.toLocaleDateString();
  }
}

function showToast(msg, dur = 3000) {
  const c = document.getElementById('toastContainer');
  if (!c) return;
  
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  c.appendChild(el);
  
  setTimeout(() => {
    el.classList.add('exit');
    setTimeout(() => { if (el.parentNode) el.remove(); }, 280);
  }, dur);
}

function checkWelcomeCard() {
  if (!localStorage.getItem('ph_welcome_seen')) {
    setTimeout(() => document.getElementById('welcomeOverlay').classList.add('active'), 650);
  }
}

window.dismissWelcome = function() {
  localStorage.setItem('ph_welcome_seen', 'true');
  document.getElementById('welcomeOverlay').classList.remove('active');
};

window.showSmartAccountModal = function() {
  const modal = document.getElementById('accountModal');
  const content = document.getElementById('accountModalContent');
  const user = auth.currentUser;

  if (user && !user.isAnonymous) {
    content.innerHTML = `
      <h2>PH·SUGGEST</h2>
      <div class="user-greeting">👋 ${user.displayName || 'player'}</div>
      <div class="modal-buttons">
        <button class="modal-btn warning" onclick="logout()">🚪 log out</button>
        <button class="modal-btn secondary" onclick="switchAccounts()">🔄 switch accounts</button>
      </div>`;
  } else if (user && user.isAnonymous) {
    content.innerHTML = `
      <h2>PH·SUGGEST</h2>
      <div class="user-greeting">👤 guest mode</div>
      <div class="modal-buttons">
        <button class="modal-btn primary" onclick="showSignup()">✨ create account</button>
        <button class="modal-btn warning" onclick="logout()">🚪 log out</button>
      </div>`;
  } else {
    content.innerHTML = `
      <h2>PH·SUGGEST</h2>
      <p>sign in to submit suggestions</p>
      <div class="modal-buttons">
        <button class="modal-btn primary" onclick="showSignup()">✨ create account</button>
        <button class="modal-btn secondary" onclick="continueAsGuest()">👤 continue as guest</button>
      </div>
      <a class="modal-link" onclick="showLogin()">already have an account? sign in →</a>`;
  }

  modal.style.display = 'flex';
  setTimeout(() => modal.classList.add('active'), 10);
};

window.switchAccounts = function() {
  auth.signOut().then(() => { 
    closeAllModals(); 
    setTimeout(() => showSmartAccountModal(), 300); 
  });
};

window.logout = function() {
  auth.signOut().then(() => {
    showToast('👋 logged out');
    closeAllModals();
    document.getElementById('accountBtn').innerHTML = '✨ sign in';
    currentUser = null;
    isGuest = false;
    updateFormAccess();
  });
};

function updateFormAccess() {
  const user = auth.currentUser;
  const submitBtn = document.getElementById('submitSuggestionBtn');
  
  if (!submitBtn) return;
  
  if (user && !user.isAnonymous) {
    submitBtn.disabled = false;
    submitBtn.title = '';
  } else {
    submitBtn.disabled = true;
    submitBtn.title = 'Sign in to submit suggestions';
  }
}

window.toggleOptimized = function() {
  document.body.classList.toggle('optimized-mode');
  document.getElementById('optimizedToggle').classList.toggle('active');
  const on = document.body.classList.contains('optimized-mode');
  localStorage.setItem('ph_optimized', on ? 'on' : 'off');
  showToast(on ? '⚡ Optimized mode enabled' : '✨ Optimized mode disabled');
};

if (localStorage.getItem('ph_optimized') === 'on') {
  document.body.classList.add('optimized-mode');
  document.getElementById('optimizedToggle').classList.add('active');
}

if (!localStorage.getItem('ph_optimized')) {
  const lowEnd = navigator.hardwareConcurrency <= 2 ||
    /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  if (lowEnd) {
    document.body.classList.add('optimized-mode');
    document.getElementById('optimizedToggle').classList.add('active');
    localStorage.setItem('ph_optimized', 'on');
  }
}

window.toggleVault = function(id) {
  const content = document.getElementById(id + 'Content');
  const icon = document.getElementById(id + 'Icon');
  const header = document.querySelector(`#${id} .vault-header`);
  const open = content.classList.contains('expanded');
  content.classList.toggle('expanded', !open);
  if (icon) icon.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
  if (header) header.classList.toggle('active', !open);
};

window.register = function() {
  const user = document.getElementById('signupUsername').value.trim();
  const pass = document.getElementById('signupPassword').value.trim();
  
  if (!user || !pass) { 
    showToast('❌ enter username and password'); 
    return; 
  }
  if (pass.length < 6) { 
    showToast('❌ password must be at least 6 characters'); 
    return; 
  }
  
  const email = user.toLowerCase().replace(/[^a-z0-9]/g, '') + '@ph.user';
  
  auth.createUserWithEmailAndPassword(email, pass)
    .then(cred => {
      const u = cred.user;
      return u.updateProfile({ displayName: user });
    })
    .then(() => { 
      showToast(`✅ welcome, ${user}!`); 
      closeAllModals(); 
    })
    .catch(err => {
      if (err.code === 'auth/email-already-in-use') showToast('❌ username already exists');
      else if (err.code === 'auth/weak-password') showToast('❌ password too weak');
      else showToast('❌ signup failed: ' + err.message);
    });
};

window.login = function() {
  const user = document.getElementById('loginUsername').value.trim();
  const pass = document.getElementById('loginPassword').value.trim();
  
  if (!user || !pass) { 
    showToast('❌ enter username and password'); 
    return; 
  }
  
  const email = user.toLowerCase().replace(/[^a-z0-9]/g, '') + '@ph.user';
  
  auth.signInWithEmailAndPassword(email, pass)
    .then(() => { 
      showToast(`👋 welcome back, ${user}`); 
      closeAllModals(); 
    })
    .catch((err) => {
      console.error('Login error:', err);
      showToast('❌ invalid username or password');
    });
};

window.continueAsGuest = function() {

auth.onAuthStateChanged(user => {
  const btn = document.getElementById('accountBtn');
  if (!btn) return;

  if (user) {
    if (!user.isAnonymous) { 
      currentUser = user.displayName || user.email?.split('@')[0] || 'user'; 
      btn.innerHTML = `👤 ${currentUser}`; 
      isGuest = false; 
    } else { 
      btn.innerHTML = '👤 guest (view only)'; 
      currentUser = 'guest'; 
      isGuest = true; 
    }
  } else {
    btn.innerHTML = '✨ sign in';
    currentUser = null;
    isGuest = false;
  }
  
  updateFormAccess();
});

window.submitSuggestion = async function() {
  const user = auth.currentUser;
  
  if (!user || user.isAnonymous) {
    showToast('❌ Please sign in to submit suggestions');
    showSmartAccountModal();
    return;
  }
  
  const type = document.getElementById('suggestionType').value;
  const urgency = document.getElementById('suggestionUrgency').value;
  const title = document.getElementById('suggestionTitle').value.trim();
  const description = document.getElementById('suggestionDescription').value.trim();
  
  if (!title || !description) {
    showToast('❌ Please fill in all fields');
    return;
  }
  
  if (title.length < 5) {
    showToast('❌ Title must be at least 5 characters');
    return;
  }
  
  if (description.length < 20) {
    showToast('❌ Description must be at least 20 characters');
    return;
  }
  
  // Show loading state
  const submitBtn = document.getElementById('submitSuggestionBtn');
  const originalText = submitBtn.textContent;
  submitBtn.textContent = 'submitting...';
  submitBtn.disabled = true;
  
  const suggestion = {
    type,
    urgency,
    title,
    description,
    author: user.displayName || user.email?.split('@')[0] || 'Anonymous',
    userId: user.uid,
    timestamp: Date.now(),
    status: 'new'
  };
  
  try {
    // Save to Firebase first
    await saveSuggestionToFirebase(suggestion);
    
    // Clear form
    document.getElementById('suggestionTitle').value = '';
    document.getElementById('suggestionDescription').value = '';
    
    // Try Discord webhook (don't await - let it happen in background)
    fetch(DISCORD_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        embeds: [{
          title: `💡 New Suggestion: ${title}`,
          color: 0xff6b00,
          fields: [
            {
              name: 'Type',
              value: typeLabels[type] || type,
              inline: true
            },
            {
              name: 'Urgency',
              value: urgencyLabels[urgency] || urgency,
              inline: true
            },
            {
              name: 'From',
              value: user.displayName || 'Anonymous',
              inline: true
            },
            {
              name: 'Description',
              value: description.substring(0, 1024)
            }
          ],
          footer: {
            text: `User ID: ${user.uid}`
          },
          timestamp: new Date().toISOString()
        }]
      })
    }).catch(err => console.log('Discord webhook error (non-critical):', err));
    
    showToast('✅ Suggestion submitted! Thank you for your input.');
    
  } catch (error) {
    console.error('❌ Submission error:', error);
    
    if (error.code === 'PERMISSION_DENIED') {
      showToast('❌ Permission denied. Please check Firebase rules.');
    } else if (error.message && error.message.includes('404')) {
      showToast('❌ Firebase database not found! Please create it in Firebase Console.');
    } else {
      showToast('❌ Failed to save suggestion: ' + (error.message || 'Unknown error'));
    }
  } finally {
    // Restore button
    submitBtn.textContent = originalText;
    submitBtn.disabled = false;
  }
};

window.filterSuggestions = debounce(function() {
  const q = document.getElementById('searchBar').value.toLowerCase();
  const filtered = suggestions.filter(s => 
    s.title.toLowerCase().includes(q) || 
    s.description.toLowerCase().includes(q)
  );
  
  const container = document.getElementById('suggestionsContainer');
  if (!container) return;
  
  container.innerHTML = '';
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-suggestions">🔍 No matching suggestions found</div>';
    return;
  }
  
  filtered.forEach(s => {
    container.appendChild(createSuggestionCard(s));
  });
}, 150);

window.sortSuggestions = function() {
  const sortBy = document.getElementById('sortOptions').value;
  const container = document.getElementById('suggestionsContainer');
  if (!container) return;
  
  let sorted = [...suggestions];
  
  if (sortBy === 'newest') {
    sorted.sort((a, b) => b.timestamp - a.timestamp);
  } else if (sortBy === 'oldest') {
    sorted.sort((a, b) => a.timestamp - b.timestamp);
  }
  
  container.innerHTML = '';
  sorted.forEach(s => {
    container.appendChild(createSuggestionCard(s));
  });
};

function debounce(fn, wait) {
  let t;
  return function(...a) { 
    clearTimeout(t); 
    t = setTimeout(() => fn(...a), wait); 
  };
}
