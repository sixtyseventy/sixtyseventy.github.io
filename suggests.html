<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coming soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', 'Space Grotesk', monospace;
            position: relative;
            overflow: hidden;
        }

        /* Shiny orange effect background */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 30% 40%, rgba(255, 107, 0, 0.25) 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(255, 140, 46, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 20% 80%, rgba(255, 179, 71, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 107, 0, 0.2) 0%, transparent 40%),
                repeating-linear-gradient(45deg, transparent 0px, transparent 20px, rgba(255, 107, 0, 0.02) 20px, rgba(255, 107, 0, 0.02) 40px);
            animation: glowPulse 8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        /* Orange orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: rgba(255, 107, 0, 0.2);
            top: -200px;
            left: -200px;
            animation: float1 12s ease-in-out infinite alternate;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(255, 140, 46, 0.15);
            bottom: -150px;
            right: -150px;
            animation: float2 10s ease-in-out infinite alternate;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: rgba(255, 179, 71, 0.1);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(100px);
            animation: float3 15s ease-in-out infinite alternate;
        }

        @keyframes float1 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(100px, 80px) scale(1.3); opacity: 0.8; }
        }

        @keyframes float2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(-120px, -100px) scale(1.4); opacity: 0.7; }
        }

        @keyframes float3 {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.6; }
        }

        @keyframes glowPulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* Main content */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
        }

        /* Shiny orange text effect */
        .coming-soon {
            font-size: clamp(3rem, 15vw, 7rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            
            /* Shiny orange gradient */
            background: linear-gradient(
                135deg,
                #ff6b00 0%,
                #ffb347 30%,
                #ff8c2e 50%,
                #ff6b00 70%,
                #ffb347 100%
            );
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            
            text-shadow: 0 0 30px rgba(255, 107, 0, 0.5);
            position: relative;
        }

        @keyframes shine {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        /* Glowing underline effect */
        .coming-soon::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff6b00, #ffb347, #ff6b00, transparent);
            border-radius: 3px;
            box-shadow: 0 0 20px #ff6b00;
            animation: underlinePulse 2s ease-in-out infinite alternate;
        }

        @keyframes underlinePulse {
            0% { width: 100px; opacity: 0.7; }
            100% { width: 200px; opacity: 1; box-shadow: 0 0 40px #ff8c2e; }
        }

        /* Subtext */
        .subtext {
            font-size: clamp(1rem, 4vw, 1.4rem);
            color: rgba(255, 255, 255, 0.7);
            margin-top: 2rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            animation: fadeInOut 2.5s ease-in-out infinite alternate;
        }

        @keyframes fadeInOut {
            0% { opacity: 0.5; text-shadow: 0 0 10px rgba(255, 107, 0, 0.3); }
            100% { opacity: 1; text-shadow: 0 0 30px rgba(255, 107, 0, 0.7); }
        }

        /* Decorative elements */
        .dots {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 3rem 0 1rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6b00;
            animation: dotPulse 1.4s ease-in-out infinite;
            box-shadow: 0 0 15px #ff6b00;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        .dot:nth-child(4) { animation-delay: 0.6s; }
        .dot:nth-child(5) { animation-delay: 0.8s; }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 30px #ff8c2e; }
        }

        /* Grid overlay */
        .grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 107, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
            animation: gridFade 4s ease-in-out infinite alternate;
        }

        @keyframes gridFade {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }

        /* Scanline effect */
        .scanline {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(255, 107, 0, 0.03) 4px
            );
            pointer-events: none;
            z-index: 2;
            animation: scanMove 8s linear infinite;
        }

        @keyframes scanMove {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* Corners */
        .corner {
            position: absolute;
            width: 80px;
            height: 80px;
            border-color: #ff6b00;
            z-index: 20;
        }

        .corner-tl {
            top: 2rem;
            left: 2rem;
            border-top: 2px solid #ff6b00;
            border-left: 2px solid #ff6b00;
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.5);
        }

        .corner-tr {
            top: 2rem;
            right: 2rem;
            border-top: 2px solid #ff6b00;
            border-right: 2px solid #ff6b00;
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.5);
        }

        .corner-bl {
            bottom: 2rem;
            left: 2rem;
            border-bottom: 2px solid #ff6b00;
            border-left: 2px solid #ff6b00;
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.5);
        }

        .corner-br {
            bottom: 2rem;
            right: 2rem;
            border-bottom: 2px solid #ff6b00;
            border-right: 2px solid #ff6b00;
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.5);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .corner {
                width: 40px;
                height: 40px;
            }
            
            .back-link {
                bottom: 1rem;
                left: 1rem;
                padding: 0.6rem 1.2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    
    <div class="grid"></div>
    
    <div class="scanline"></div>
    
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    
    <div class="container">
        <h1 class="coming-soon">coming soon.</h1>
        
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <div class="subtext">suggestions page in development</div>
    </div>
    
    
    <script>
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            
            document.body.style.setProperty('--mouse-x', x + '%');
            document.body.style.setProperty('--mouse-y', y + '%');
        });
    </script>
</body>
</html>
